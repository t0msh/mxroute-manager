version: 1

exclude:
  - node_modules
  - .git
  - dist
  - build
  - coverage
  - .venv
  - venv
  - __pycache__
  - .pytest_cache
  - logs
  - docs/images
  - build_info.py

engines:
  format: true
  lint: true
  code-quality: true
  ai-slop: true
  architecture: false
  security: true

quality:
  maxFunctionLoc: 80
  maxFileLoc: 400
  maxNesting: 5
  maxParams: 6

security:
  audit: false
  auditTimeout: 25000

scoring:
  weights:
    format: 0.3
    lint: 0.6
    code-quality: 0.8
    ai-slop: 1.0
    architecture: 1.0
    security: 1.5
  thresholds:
    good: 75
    ok: 50
  smoothing: 20
  maxPerRule: 40

ci:
  failBelow: 70
  format: json

telemetry:
  enabled: true
