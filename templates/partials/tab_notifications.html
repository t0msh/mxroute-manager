<!-- Notifications Tab Panel (Admin Only) -->
<div id="tab-notifications" class="tab-panel">
    <div class="glass-card" id="notifications-card" style="display: none;">
        <div class="card-title">
            <span>{{ icon('bell') }}</span> Notifications
            <span class="badge">Admin Only</span>
        </div>

        <p class="stat-card-subtitle notifications-intro">
            Send alerts when selected audit events occur. Delivery uses
            <a class="text-link" href="https://github.com/caronc/apprise" target="_blank" rel="noopener noreferrer">Apprise</a>.
            See <a class="text-link" href="https://appriseit.com/tools/url-builder/" target="_blank" rel="noopener noreferrer">Apprise URL Builder</a>
            for services not listed in the target builder.
        </p>

        <div class="form-group setting-toggle-row">
            <label for="setting-notifications-enabled">Enable notifications</label>
            <label class="toggle-switch" aria-label="Enable notifications">
                <input type="checkbox" id="setting-notifications-enabled">
                <span class="toggle-slider"></span>
            </label>
        </div>

        <div class="form-group notification-targets-section">
            <label class="notification-targets-label">Notification targets</label>
            <div id="notification-targets-list" class="notification-targets-list"></div>
            <div style="display: flex; gap: 0.75rem; margin-top: 0.75rem; flex-wrap: wrap;">
                <button type="button" class="btn btn-secondary btn-sm" id="btn-add-notification-target">{{ icon('plus') }} Add target</button>
            </div>
            <span id="notification-env-hint" class="notifications-hint"></span>
        </div>

        <div class="form-group notification-events-section">
            <label>Notify on audit events</label>
            <div style="display: flex; gap: 0.5rem; flex-wrap: wrap; margin-bottom: 0.75rem;">
                <button type="button" class="btn btn-secondary btn-sm" id="btn-notify-preset-destructive">Select destructive</button>
                <button type="button" class="btn btn-secondary btn-sm" id="btn-notify-preset-all">Select all</button>
                <button type="button" class="btn btn-secondary btn-sm" id="btn-notify-preset-clear">Clear all</button>
            </div>
            <div id="notification-actions-grid" class="notification-actions-grid"></div>
        </div>

        <div style="display: flex; justify-content: flex-end; gap: 0.75rem; margin-top: 1.5rem; flex-wrap: wrap;">
            <button type="button" class="btn btn-secondary" id="btn-test-notifications">{{ icon('bell') }} Send Test Notification</button>
            <button type="button" class="btn btn-primary" id="btn-save-notifications">{{ icon('save') }} Save Notifications</button>
        </div>
    </div>
</div>

<style>
    .notifications-intro {
        margin-bottom: 1.5rem;
    }

    .notification-targets-section {
        margin-top: 0.5rem;
    }

    .notification-targets-label {
        margin-bottom: 0.75rem;
    }

    .notification-events-section {
        margin-top: 2rem;
    }

    .notifications-hint {
        font-size: 0.75rem;
        color: var(--color-secondary);
        display: block;
        margin-top: 0.75rem;
        line-height: 1.5;
    }

    .notification-targets-list {
        display: flex;
        flex-direction: column;
        gap: 0.5rem;
    }

    .notification-target-row {
        display: grid;
        grid-template-columns: 1fr 100px 2fr auto;
        gap: 0.75rem;
        align-items: center;
        padding: 0.75rem 1rem;
        border: 1px solid var(--glass-border);
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.02);
        font-size: 0.85rem;
    }

    .notification-target-row .target-url {
        font-family: monospace;
        font-size: 0.75rem;
        color: var(--color-muted);
        word-break: break-all;
    }

    .notification-actions-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
        gap: 0.75rem 1.25rem;
        max-height: 320px;
        overflow-y: auto;
        padding: 0.75rem;
        border: 1px solid var(--glass-border);
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.02);
    }

    .notification-action-group-title {
        grid-column: 1 / -1;
        font-size: 0.7rem;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        color: var(--color-muted);
        margin-top: 0.25rem;
    }

    .notification-action-item {
        display: flex;
        align-items: flex-start;
        gap: 0.5rem;
        font-size: 0.85rem;
        line-height: 1.3;
    }

    #modal-notification-target .form-group {
        gap: 0.65rem;
        margin-bottom: 1.1rem;
    }

    #modal-notification-target .form-group label {
        margin-bottom: 0.15rem;
    }

    @media (max-width: 768px) {
        .notification-target-row {
            grid-template-columns: 1fr;
        }
    }
</style>
