version: '3.8'

services:
  mxroute-manager:
    build: .
    container_name: mxroute-manager
    restart: always
    ports:
      - "5000:5000"
    env_file:
      - .env
    environment:
      - DATABASE_FILE=/data/mxroute-manager.db
      - LOG_DIR=/data/logs
    volumes:
      - mxroute_manager_data:/data

volumes:
  mxroute_manager_data:
