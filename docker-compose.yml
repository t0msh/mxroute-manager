version: '3.8'

services:
  mxroute-manager:
    build: .
    container_name: mxroute-manager
    restart: always
    ports:
      - "5000:5000"
    env_file:
      - .env
    environment:
      - DATABASE_FILE=/data/mxroute-manager.db
      - LOG_DIR=/data/logs
    volumes:
      - mxroute_manager_data:/data
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:5000/health')",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

volumes:
  mxroute_manager_data:
