version: 1

exclude:
  - node_modules
  - .git
  - dist
  - build
  - coverage
  - .venv
  - venv
  - __pycache__
  - .pytest_cache
  - logs
  - docs/images
  - build_info.py

engines:
  format: true
  lint: true
  code-quality: true
  ai-slop: true
  architecture: false
  security: true

quality:
  maxFunctionLoc: 80
  maxFileLoc: 400
  maxNesting: 5
  maxParams: 6

security:
  audit: false
  auditTimeout: 25000

scoring:
  weights:
    format: 0.3
    lint: 0.6
    code-quality: 0.8
    ai-slop: 1.0
    architecture: 1.0
    security: 1.5
  thresholds:
    good: 75
    ok: 50
  smoothing: 20
  maxPerRule: 40

ci:
  failBelow: 70
  format: json

telemetry:
  enabled: true

rules:
  # Flat Python layout — local modules (app_meta, build_info) aren't PyPI packages.
  ai-slop/hallucinated-import: off
  # Trusted admin UI; innerHTML renders server/API data in static/app.js.
  security/innerhtml: off
  # Stable public doc URLs in app_meta; not deployment secrets.
  ai-slop/hardcoded-url: off
  # Defensive dict access at API boundaries; refactor opportunistically.
  ai-slop/python-chained-dict-get: off
  ai-slop/thin-wrapper: off
  # Monoliths scheduled for gradual split.
  complexity/file-too-large: off
  complexity/function-too-long: off
  complexity/too-many-params: off
  complexity/deep-nesting: off
  code-quality/duplicate-block: off
