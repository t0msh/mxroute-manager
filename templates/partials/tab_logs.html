<!-- Tab Panel 8: System Logs -->
<div class="tab-panel" id="tab-logs">
    <div class="glass-card">
        <h3 class="card-title">{{ icon('journal-text') }} System Audit Logs</h3>
        <p class="stat-card-subtitle mb-4">View and monitor authentication events, configuration changes, and administrator actions.</p>

        <!-- Filters and control bar -->
        <div style="display: flex; flex-wrap: wrap; gap: 1rem; align-items: center; margin-bottom: 1.5rem; justify-content: space-between;">
            <div style="display: flex; flex-wrap: wrap; gap: 1.25rem; align-items: center; flex: 1; min-width: 300px;">
                <div class="form-group" style="min-width: 180px; margin-bottom: 0; gap: 0.25rem;">
                    <label for="logs-date-select" style="font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.05em; font-weight: 600;">Log Date</label>
                    <select id="logs-date-select" style="padding: 0.55rem 0.8rem; font-size: 0.85rem; border-radius: 8px;">
                        <option value="">Loading dates...</option>
                    </select>
                </div>
                
                <div class="form-group" style="min-width: 100px; margin-bottom: 0; gap: 0.25rem;">
                    <label for="logs-limit-select" style="font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.05em; font-weight: 600;">Limit</label>
                    <select id="logs-limit-select" style="padding: 0.55rem 0.8rem; font-size: 0.85rem; border-radius: 8px;">
                        <option value="50">50</option>
                        <option value="100" selected>100</option>
                        <option value="250">250</option>
                        <option value="500">500</option>
                    </select>
                </div>

                <div class="form-group" style="flex: 1; min-width: 220px; margin-bottom: 0; gap: 0.25rem;">
                    <label for="logs-search" style="font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.05em; font-weight: 600;">Filter Table</label>
                    <input type="text" id="logs-search" placeholder="Filter by action, user, target, or details..." style="padding: 0.55rem 0.8rem; font-size: 0.85rem; border-radius: 8px;">
                </div>
            </div>

            <div style="display: flex; gap: 1.25rem; align-items: center; margin-top: 1rem; margin-bottom: 0;">
                <label style="display: flex; align-items: center; gap: 0.5rem; font-size: 0.85rem; color: var(--color-secondary); cursor: pointer; user-select: none;">
                    <input type="checkbox" id="logs-auto-refresh" style="width: auto; height: auto; margin: 0; cursor: pointer;"> Auto-refresh (10s)
                </label>
                <select id="logs-download-format" style="padding: 0.55rem 0.8rem; font-size: 0.85rem; border-radius: 8px;">
                    <option value="csv" selected>CSV</option>
                    <option value="jsonl">JSONL</option>
                </select>
                <button class="btn btn-secondary btn-sm" id="btn-download-logs" style="padding: 0.55rem 1rem;">{{ icon('download') }} Download</button>
                <button class="btn btn-secondary btn-sm" id="btn-refresh-logs" style="padding: 0.55rem 1rem;">{{ icon('arrow-clockwise') }} Reload Logs</button>
            </div>
        </div>

        <!-- Logs Table -->
        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th style="width: 200px;">Timestamp (UTC)</th>
                        <th style="width: 150px;">User</th>
                        <th style="width: 180px;">Action</th>
                        <th style="width: 200px;">Target</th>
                        <th>Details</th>
                    </tr>
                </thead>
                <tbody id="logs-list-tbody">
                        <tr class="table-empty-row">
                            <td colspan="5"><div class="table-empty-message">No logs loaded.</div></td>
                        </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
