<!-- Tab Panel 6: Access Control / Delegations -->
<div class="tab-panel" id="tab-delegations">
    <div class="grid-2">
        <!-- Add/Update Delegation Form -->
        <div class="glass-card">
            <h3 class="card-title">👥 Delegate Domain Access</h3>
            <p class="stat-card-subtitle mb-4">Grant or update domain-level access permissions for a specific
                user.</p>
            <form id="form-create-delegation">
                <div class="form-group mb-4">
                    <label for="delegation-email">User Email Address</label>
                    <input type="email" id="delegation-email" placeholder="user@example.com" required>
                </div>
                <div class="form-group mb-4">
                    <label>Assigned Domains</label>
                    <p class="stat-card-subtitle mb-2">Select the domains this user is allowed to manage:</p>
                    <div id="delegation-domains-checklist"
                        style="background: rgba(0, 0, 0, 0.3); border: 1px solid var(--glass-border); border-radius: 10px; padding: 1rem; max-height: 200px; overflow-y: auto; display: flex; flex-direction: column; gap: 0.75rem;">
                        <div style="color: var(--color-muted); font-size: 0.9rem;">Loading available domains...
                        </div>
                    </div>
                </div>
                <button type="submit" class="btn btn-primary">Save Access Rights</button>
            </form>
        </div>

        <!-- Active Delegations List -->
        <div class="glass-card">
            <h3 class="card-title">📋 Current Access Delegations</h3>
            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>User Email</th>
                            <th>Delegated Domains</th>
                            <th style="text-align: right;">Action</th>
                        </tr>
                    </thead>
                    <tbody id="delegations-list-tbody">
                        <tr>
                            <td colspan="3" style="text-align: center; color: var(--color-muted);">No
                                delegations configured yet.</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
